<mat-sidenav-container class="app-container">
  
  <mat-sidenav mode="side" opened class="sidebar">
    <div class="brand-section">
      <mat-icon class="material-icons">widgets</mat-icon>
      <span>SUPPLIER<b>HUB</b></span>
    </div>

    <mat-nav-list class="nav-list">
      <div class="nav-label">เมนูหลัก</div>
      
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <div matListItemTitle>แดชบอร์ด</div>
      </a>

      <a mat-list-item routerLink="/purchase-order" routerLinkActive="active" class="nav-item">
        <mat-icon matListItemIcon>assignment</mat-icon>
        <div matListItemTitle>ใบสั่งของ (Orders)</div>
        <span class="order-badge">3</span>
      </a>

      <a mat-list-item routerLink="/inventory" routerLinkActive="active" class="nav-item">
        <mat-icon matListItemIcon>inventory_2</mat-icon>
        <div matListItemTitle>สินค้าและวัตถุดิบ</div>
      </a>

      <a mat-list-item routerLink="/finance" routerLinkActive="active" class="nav-item">
        <mat-icon matListItemIcon>monetization_on</mat-icon>
        <div matListItemTitle>การเงิน (รายได้)</div>
      </a>
    </mat-nav-list>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="avatar">A</div>
        <div>
          <div class="user-name">ABC Supplier Co.</div>
          <div class="logout">ออกจากระบบ</div>
        </div>
      </div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    
    <header class="top-header d-flex justify-content-between align-items-center">
      <div class="search-box">
        <mat-icon>search</mat-icon>
        <input type="text" placeholder="ค้นหาทั่วทั้งระบบ...">
      </div>
      <div class="header-right d-flex align-items-center gap-3">
        <mat-icon class="text-muted">notifications_none</mat-icon>
        <div class="text-end">
          <div class="fw-bold fs-6">บริษัท เอบีซี ซัพพลาย</div>
          <div class="text-muted" style="font-size: 12px;">SP-2023001</div>
        </div>
      </div>
    </header>

    <div class="page-padding">
      <router-outlet></router-outlet>
    </div>
    
  </mat-sidenav-content>
</mat-sidenav-container>
