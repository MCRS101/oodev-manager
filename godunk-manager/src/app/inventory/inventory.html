<div class="container-fluid p-4">
  <div class="header-group d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold m-0 text-primary">คลังสินค้าและวัตถุดิบ</h2>
      <p class="text-muted small m-0">จัดการสต็อกและจุดสั่งซื้อ (Reorder Point)</p>
    </div>
    
    <div class="d-flex gap-3 align-items-center">
      <div class="search-box-modern">
        <mat-icon>search</mat-icon>
        <input type="text" placeholder="ค้นหารหัส หรือชื่อสินค้า...">
      </div>
      <button mat-flat-button class="btn-add-stock">
        <mat-icon>add</mat-icon> เพิ่มสินค้า
      </button>
    </div>
  </div>

  <mat-card class="modern-card">
    <div class="table-responsive">
      <table class="table table-hover align-middle m-0">
        <thead>
          <tr>
            <th class="ps-4">ข้อมูลสินค้า</th>
            <th>หมวดหมู่</th>
            <th class="text-center">คงเหลือ (สต็อก)</th>
            <th>สถานะ</th>
            <th class="text-center pe-4">จัดการ</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of products" class="row-item">
            <td class="ps-4">
              <div class="fw-bold text-dark">{{item.name}}</div>
              <div class="text-muted x-small text-uppercase">{{item.code}}</div>
            </td>
            <td><span class="badge-category">{{item.category}}</span></td>
            <td class="text-center">
              <div class="stock-container">
                <span class="stock-val" [ngClass]="item.status">{{item.stock | number}}</span>
                <span class="text-muted small ms-1">{{item.unit}}</span>
              </div>
              <div class="progress-mini">
                <div class="progress-bar-mini" [ngClass]="item.status" [style.width.%]="item.stock > 100 ? 100 : item.stock"></div>
              </div>
            </td>
            <td>
              <div class="status-pill-modern" [ngClass]="item.status">
                <span class="pulse-indicator"></span>
                {{ item.status === 'normal' ? 'ปกติ' : item.status === 'low' ? 'ใกล้หมด' : 'หมดสต็อก' }}
              </div>
            </td>
            <td class="text-center pe-4">
              <button mat-icon-button class="btn-edit"><mat-icon>edit_note</mat-icon></button>
              <button mat-icon-button class="btn-delete"><mat-icon>delete_sweep</mat-icon></button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </mat-card>
</div>
